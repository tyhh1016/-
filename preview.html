<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartPlannerHub – 預覽</title>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {} }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }
    .animate-ping {
      animation: ping 1.5s cubic-bezier(0,0,.2,1) infinite;
    }
    @keyframes ping {
      75%, 100% { transform: scale(2); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ── Inline SVG Icon Components ── */
    const Icon = ({ d, size = 22, className = '', strokeWidth = 2 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
        className={className}>
        {[].concat(d).map((path, i) => <path key={i} d={path} />)}
      </svg>
    );

    const CalendarIcon   = (p) => <Icon size={p.size} className={p.className} d={["M8 2v4","M16 2v4","M3 10h18","M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"]} />;
    const InboxIcon      = (p) => <Icon size={p.size} className={p.className} d={["M22 12h-6l-2 3H10L8 12H2","M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"]} />;
    const CheckIcon      = (p) => <Icon size={p.size} className={p.className} strokeWidth={p.strokeWidth||2} d="M20 6 9 17l-5-5" />;
    const XIcon          = (p) => <Icon size={p.size} className={p.className} strokeWidth={p.strokeWidth||2} d={["M18 6 6 18","m6 6 12 12"]} />;
    const MessageSqIcon  = (p) => <Icon size={p.size} className={p.className} d={["M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"]} />;
    const ClockIcon      = (p) => <Icon size={p.size} className={p.className} d={["M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z","M12 6v6l4 2"]} />;
    const SchoolIcon     = (p) => <Icon size={p.size} className={p.className} d={["M22 10v6M2 10l10-5 10 5-10 5z","M6 12v5c3 3 9 3 12 0v-5"]} />;
    const SearchIcon     = (p) => <Icon size={p.size} className={p.className} d={["M21 21l-4.35-4.35","M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"]} />;
    const MoreHorizIcon  = (p) => <Icon size={p.size} className={p.className} d={["M8 12h.01","M12 12h.01","M16 12h.01"]} strokeWidth={3} />;

    /* ── NavItem ── */
    const NavItem = ({ icon, label, active, onClick }) => (
      <div onClick={onClick}
        className={`flex items-center gap-4 px-6 py-4 rounded-2xl cursor-pointer transition-all duration-300
          ${active ? 'bg-[#7C3AED] text-white shadow-xl shadow-purple-200' : 'text-slate-400 hover:bg-slate-50 hover:text-slate-600'}`}>
        {icon}
        <span className="text-sm font-bold tracking-tight">{label}</span>
      </div>
    );

    /* ── StatBox ── */
    const StatBox = ({ icon, label, value, sub }) => (
      <div className="bg-white p-7 rounded-[35px] shadow-sm border border-slate-50 hover:shadow-xl hover:shadow-slate-200/50 transition-all duration-500 cursor-default group">
        <div className="w-14 h-14 rounded-2xl bg-slate-50 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-white group-hover:shadow-md transition-all">{icon}</div>
        <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">{label}</p>
        <p className="text-2xl font-black text-slate-800 mb-1">{value}</p>
        <p className="text-[10px] text-slate-400 font-medium">{sub}</p>
      </div>
    );

    /* ── Main App ── */
    const App = () => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [messages, setMessages] = useState([]);

      useEffect(() => {
        if ("Notification" in window) Notification.requestPermission();
        setMessages([
          { id: 1, app: 'Gmail', sender: 'Google Classroom', content: '數學老師發布作業：微積分 P.20，截止：週五 23:59', time: '23:04', status: 'pending' },
          { id: 2, app: 'Line',  sender: '導師',             content: '明天早自習要進行升學講座，請大家準時。',           time: '22:15', status: 'pending' },
          { id: 3, app: 'Instagram', sender: '學長',         content: '那本參考書還要用嗎？',                           time: '21:30', status: 'read'    },
          { id: 4, app: 'X',    sender: '教育廣播',          content: '今日高三學科能力測驗重點整理...',                 time: '19:00', status: 'new'     },
        ]);
      }, []);

      const sendPush = (title, body) => {
        if (Notification.permission === "granted") {
          new Notification(title, { body });
        } else {
          alert("請開啟瀏覽器通知權限以模擬手機訊息列效果");
        }
      };

      const pending = messages.filter(m => m.status === 'pending');

      const [dismissed, setDismissed] = useState(new Set());
      const dismiss = (id) => setDismissed(prev => new Set([...prev, id]));
      const visiblePending = pending.filter(m => !dismissed.has(m.id));

      return (
        <div className="flex h-screen bg-[#F4F7FE] text-slate-800 antialiased overflow-hidden">

          {/* ── Sidebar ── */}
          <aside className="w-72 bg-white border-r border-slate-200 flex flex-col p-8 shrink-0">
            <div className="flex items-center gap-3 mb-12">
              <div className="w-11 h-11 bg-[#7C3AED] rounded-2xl flex items-center justify-center text-white shadow-lg shadow-purple-200 font-black text-xl select-none">S</div>
              <h1 className="font-extrabold text-2xl tracking-tight text-slate-800">SmartHub</h1>
            </div>

            <nav className="space-y-2 flex-1">
              <NavItem icon={<CalendarIcon size={22}/>}  label="總覽儀表板"   active={activeTab==='dashboard'} onClick={()=>setActiveTab('dashboard')} />
              <NavItem icon={<InboxIcon size={22}/>}     label="訊息收件匣"   active={activeTab==='inbox'}     onClick={()=>setActiveTab('inbox')} />
              <NavItem icon={<SchoolIcon size={22}/>}    label="校園/升學資訊" active={activeTab==='school'}    onClick={()=>setActiveTab('school')} />
            </nav>

            <div className="bg-gradient-to-br from-purple-50 to-indigo-50 p-6 rounded-[24px] border border-purple-100 shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <span className="text-[10px] font-black text-purple-600 uppercase tracking-widest">Pending</span>
                <div className="w-2 h-2 bg-purple-500 rounded-full animate-ping"></div>
              </div>
              <p className="text-2xl font-black text-slate-800 mb-1">{visiblePending.length}</p>
              <p className="text-xs text-slate-500 font-medium mb-4">待確認的行程擬稿</p>
              <button
                onClick={()=>sendPush("新行程擬稿確認","偵測到來自 Google Classroom 的截止日期，已為您擬好行程。")}
                className="w-full bg-white text-purple-600 py-2.5 rounded-xl text-xs font-bold shadow-sm hover:shadow-md transition-all active:scale-95"
              >
                測試手機通知
              </button>
            </div>
          </aside>

          {/* ── Main Content ── */}
          <main className="flex-1 flex flex-col min-w-0">

            {/* Header */}
            <header className="h-24 px-10 flex items-center justify-between shrink-0">
              <div className="flex items-center gap-4 bg-white/60 backdrop-blur-md px-6 py-3 rounded-2xl w-[450px] shadow-sm border border-white">
                <SearchIcon size={18} className="text-slate-400" />
                <input type="text" placeholder="搜尋訊息、課程或升學資訊..."
                  className="bg-transparent border-none focus:outline-none text-sm w-full font-medium" />
              </div>
              <div className="flex items-center gap-6">
                <div className="flex flex-col items-end">
                  <span className="text-sm font-bold text-slate-700">高三專注模式</span>
                  <span className="text-[10px] text-emerald-500 font-bold flex items-center gap-1">
                    <span className="inline-block w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> Google Sheet 已對接
                  </span>
                </div>
                <div className="w-12 h-12 rounded-2xl bg-gradient-to-tr from-[#7C3AED] to-[#A855F7] p-0.5 shadow-lg shadow-purple-100">
                  <div className="w-full h-full rounded-[14px] bg-white flex items-center justify-center font-bold text-purple-600 text-xs">User</div>
                </div>
              </div>
            </header>

            {/* Scrollable content */}
            <div className="flex-1 overflow-y-auto px-10 pb-10 space-y-8">

              {/* Stats */}
              <div className="grid grid-cols-4 gap-6">
                <StatBox icon={<ClockIcon size={24} className="text-blue-500"/>}    label="今日課表"  value="6 堂"  sub="下一堂：物理 (14:00)" />
                <StatBox icon={<MessageSqIcon size={24} className="text-purple-500"/>} label="社交訊息" value="12 則" sub="3 則來自 Line 重要聯繫" />
                <StatBox icon={<CalendarIcon size={24} className="text-orange-500"/>}  label="待辦作業" value="2 件"  sub="微積分習題即將截止" />
                <StatBox icon={<SchoolIcon size={24} className="text-emerald-500"/>}   label="升學資訊" value="1 則"  sub="校網升學公告更新" />
              </div>

              <div className="grid grid-cols-12 gap-8">

                {/* Calendar (8 cols) */}
                <div className="col-span-8 bg-white rounded-[40px] p-10 shadow-sm border border-slate-100/50">
                  <div className="flex justify-between items-center mb-10">
                    <h2 className="text-2xl font-black text-slate-800 tracking-tight">智慧行事曆</h2>
                    <div className="flex gap-2">
                      <button className="px-5 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold">週檢視</button>
                      <button className="px-5 py-2 bg-slate-50 text-slate-400 rounded-xl text-xs font-bold hover:bg-slate-100 transition-colors">月檢視</button>
                    </div>
                  </div>

                  <div className="grid grid-cols-7 gap-4 border-t border-slate-50 pt-8">
                    {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((day, i) => (
                      <div key={day} className="space-y-4">
                        <p className={`text-center text-[11px] font-black tracking-tighter uppercase ${i===2 ? 'text-purple-600' : 'text-slate-300'}`}>{day}</p>
                        <div className={`h-64 rounded-3xl border-2 ${i===2 ? 'bg-purple-50/30 border-purple-100' : 'bg-slate-50/50 border-transparent'} transition-all relative p-2`}>
                          {i===2 && (
                            <div className="bg-white p-3 rounded-2xl shadow-sm border-l-4 border-purple-500 text-[10px] font-bold text-slate-700">
                              討論升學專題
                              <p className="text-[9px] text-slate-400 font-normal mt-1">14:00 - 圖書館</p>
                            </div>
                          )}
                          {i===4 && (
                            <div className="bg-white p-3 rounded-2xl shadow-sm border-l-4 border-orange-400 text-[10px] font-bold text-slate-700">
                              微積分截止
                              <p className="text-[9px] text-slate-400 font-normal mt-1">23:59 - 線上繳交</p>
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Draft review (4 cols) */}
                <div className="col-span-4 space-y-6">
                  <div className="flex items-center justify-between">
                    <h2 className="text-xl font-black text-slate-800">待審核擬稿</h2>
                    <MoreHorizIcon className="text-slate-300" size={20} />
                  </div>

                  {visiblePending.map(msg => (
                    <div key={msg.id} className="bg-white p-6 rounded-[32px] shadow-xl shadow-slate-200/40 border border-white hover:border-purple-100 transition-all">
                      <div className="flex justify-between mb-4">
                        <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${msg.app==='Gmail' ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-600'}`}>
                          {msg.app} 偵測
                        </span>
                        <span className="text-[10px] font-bold text-slate-300">{msg.time}</span>
                      </div>
                      <div className="mb-4">
                        <p className="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">{msg.sender}</p>
                        <p className="text-sm font-bold text-slate-700 leading-relaxed italic">「{msg.content}」</p>
                      </div>
                      <div className="flex gap-3">
                        <button onClick={()=>dismiss(msg.id)}
                          className="flex-1 bg-emerald-500 text-white py-3.5 rounded-2xl flex items-center justify-center hover:bg-emerald-600 shadow-lg shadow-emerald-100 transition-all active:scale-95">
                          <CheckIcon size={22} strokeWidth={3} />
                        </button>
                        <button onClick={()=>dismiss(msg.id)}
                          className="flex-1 bg-slate-50 text-slate-400 py-3.5 rounded-2xl flex items-center justify-center hover:bg-slate-100 transition-all active:scale-95">
                          <XIcon size={22} strokeWidth={3} />
                        </button>
                      </div>
                    </div>
                  ))}

                  {visiblePending.length === 0 && (
                    <div className="bg-white p-8 rounded-[32px] shadow-sm border border-slate-50 text-center">
                      <p className="text-3xl mb-2">✅</p>
                      <p className="text-sm font-bold text-slate-400">所有擬稿已確認</p>
                    </div>
                  )}

                  {/* Message stream */}
                  <div className="pt-4 p-2">
                    <h3 className="text-xs font-black text-slate-300 uppercase tracking-widest mb-6">今日訊息流</h3>
                    <div className="space-y-5">
                      {messages.slice(2, 4).map(m => (
                        <div key={m.id} className="flex items-start gap-4">
                          <div className="w-10 h-10 rounded-xl bg-white border border-slate-100 flex items-center justify-center shadow-sm font-bold text-xs shrink-0">{m.app[0]}</div>
                          <div className="flex-1 min-w-0 border-b border-slate-50 pb-4">
                            <div className="flex justify-between mb-1">
                              <p className="text-xs font-black text-slate-700">{m.sender}</p>
                              <span className="text-[9px] text-slate-300 font-bold">{m.time}</span>
                            </div>
                            <p className="text-[11px] text-slate-400 truncate">{m.content}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
